name: Django Tests CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: paasify_test
          POSTGRES_USER: paasify_user
          POSTGRES_PASSWORD: paasify_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Run Django Tests
        env:
          DJANGO_SECRET_KEY: test_secret_key_for_ci_workflow_12345
          DJANGO_DEBUG: True
          DB_NAME: paasify_test
          DB_USER: paasify_user
          DB_PASSWORD: paasify_password
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python manage.py test

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile Compilation
        run: |
          docker build -t paasify-dry-run .
