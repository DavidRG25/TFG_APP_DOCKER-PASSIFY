version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "3000"
    environment:
      - DB_HOST=db
  db:
    image: mariadb:10.11
    ports:
      - "3306"
    environment:
      - MARIADB_ROOT_PASSWORD=passify_secret
      - MARIADB_DATABASE=testdb
