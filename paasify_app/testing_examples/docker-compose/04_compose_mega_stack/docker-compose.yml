version: '3.8'

services:
  gateway:
    build: ./web
    ports:
      - "80"
    networks:
      - mega-net

  api-backend:
    build: ./api
    ports:
      - "5000"
    environment:
      - REDIS_HOST=cache-layer
    networks:
      - mega-net

  cache-layer:
    image: redis:alpine
    ports:
      - "6379"
    networks:
      - mega-net

  postgres-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=passify_secret
    ports:
      - "5432"
    networks:
      - mega-net

networks:
  mega-net:
    driver: bridge
