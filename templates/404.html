{% extends "base.html" %}

{% block body %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center p-4" style="background: radial-gradient(circle at top right, #f1f5f9, #cbd5e1);">
    <div class="card border-0 shadow-lg text-center p-5" style="max-width: 550px; border-radius: 24px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);">
        
        <div class="mb-4">
            <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 100px; height: 100px;">
                <i class="fas fa-map-marked-alt text-primary fs-1"></i>
            </div>
            <h1 class="fw-bold mb-2" style="color: #1e293b; letter-spacing: -1px; font-size: 4rem;">404</h1>
            <h2 class="fw-bold mb-3" style="color: #334155;">Página no encontrada</h2>
            <p class="text-muted fs-5 px-3">
                Parece que te has perdido en la red. El recurso que buscas no existe o ha sido movido.
            </p>
        </div>

        <div class="alert alert-light border border-dashed rounded-3 py-3 mb-4 mx-2" style="background: #f8fafc;">
            <div class="d-flex align-items-center justify-content-center gap-2 text-secondary mb-1">
                <i class="fas fa-search small"></i> 
                <span class="small fw-semibold text-uppercase font-monospace text-muted">Error Code</span>
            </div>
            <div class="fw-bold text-dark fs-5">ERR_PAGE_NOT_FOUND</div>
        </div>

        <div class="d-flex flex-column align-items-center gap-3 px-4">
            <a href="{% url 'containers:student_panel' %}" class="btn btn-primary btn-lg rounded-pill fw-bold py-3 px-5 shadow-sm transform-hover w-100">
                <i class="fas fa-arrow-left me-2"></i> Volver a un lugar seguro
            </a>
            <a href="mailto:david@passify.com" class="text-decoration-none text-secondary small mt-2 opacity-75 hover-opacity-100 transition-all">
                ¿Crees que esto es un error? Informar problema
            </a>
        </div>
    </div>
</div>

<style>
.hover-opacity-100:hover { opacity: 1 !important; text-decoration: underline !important; }
.transition-all { transition: all 0.2s ease; }
.transform-hover {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.transform-hover:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 10%), 0 4px 6px -2px rgba(0, 0, 0, 5%) !important;
}
.border-dashed {
    border-style: dashed !important;
}
</style>
{% endblock %}
