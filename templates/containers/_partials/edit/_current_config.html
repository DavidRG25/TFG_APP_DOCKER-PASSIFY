{# CONFIGURACIÓN ACTUAL #}
<div class="card border-0 shadow-sm rounded-4 mb-4">
  <div class="card-header bg-transparent border-0 py-3">
    <h5 class="mb-0 fw-bold text-secondary">
      <i class="fas fa-info-circle me-2"></i>Configuración Actual
    </h5>
  </div>
  <div class="card-body p-4">
    <div class="row g-3">
      <div class="col-md-3">
        <small class="text-muted d-block mb-1">Imagen</small>
        <div class="fw-bold">{{ service.image }}</div>
      </div>
      <div class="col-md-3">
        <small class="text-muted d-block mb-1">Puerto Externo</small>
        <div class="fw-bold">
          {{ service.assigned_port|default:"Auto-asignado" }}
        </div>
      </div>
      <div class="col-md-3">
        <small class="text-muted d-block mb-1">Puerto Interno</small>
        <div class="fw-bold">
          {{ service.internal_port|default:"No especificado" }}
        </div>
      </div>
      <div class="col-md-3">
        <small class="text-muted d-block mb-1">Tipo</small>
        <div class="fw-bold">
          {{ service.get_container_type_display }}
        </div>
      </div>
    </div>
  </div>
</div>
