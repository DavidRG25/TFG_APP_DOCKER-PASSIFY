<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  function copyToClipboard(elementSelector) {
    const element = document.querySelector(elementSelector);
    if (!element) return;
    element.select();
    document.execCommand("copy");
    showToast("Copiado!");
  }

  function showToast(message, variant = "text-bg-success", title = null) {
    const variantMap = {
      "text-bg-success": "success",
      "text-bg-danger": "error",
      "text-bg-warning": "warning",
      "text-bg-info": "info",
      "text-bg-primary": "info"
    };
    const icon = variantMap[variant] || "success";
    const Toast = Swal.mixin({
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 4000,
      timerProgressBar: true,
      didOpen: (toast) => {
        toast.addEventListener('mouseenter', Swal.stopTimer)
        toast.addEventListener('mouseleave', Swal.resumeTimer)
      }
    });

    Toast.fire({
      icon: icon,
      title: title ? `<strong>${title}</strong>` : null,
      html: message,
      background: '#fff',
      color: '#2d3748',
      padding: '1rem',
      borderRadius: '1rem',
      customClass: {
        popup: 'shadow-lg border-0'
      }
    });
  }

  // Sincronizacion de eventos para asegurar el refresh
  document.body.addEventListener("htmx:afterRequest", (evt) => {
    const xhr = evt.detail.xhr;
    if (xhr && xhr.status >= 200 && xhr.status < 300) {
      try {
        const triggers = JSON.parse(xhr.getResponseHeader("HX-Trigger") || "{}");
        const hxPath = (evt.detail.pathInfo && evt.detail.pathInfo.path) ? evt.detail.pathInfo.path : "";
        const isTableFragment = hxPath && hxPath.includes("table-fragment");
        
        if (triggers["service:table-refresh"] || (hxPath && hxPath.includes("/containers/") && !isTableFragment)) {
          setTimeout(() => {
            if (window.htmx) htmx.trigger("body", "service:table-refresh");
          }, 500);
        }
      } catch (e) {}
    }
  });

  // Confirmacion de eliminacion
  window.confirmDelete = function (elt) {
    if (!elt) return;
    const name = elt.getAttribute("data-service-name") || "este servicio";
    const deleteUrl = elt.getAttribute("hx-post");
    const targetId = elt.getAttribute("hx-target");
    
    const executeDelete = () => {
      if (!window.htmx) return;
      htmx.ajax("POST", deleteUrl, {
        target: targetId,
        swap: "outerHTML",
        headers: {
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value
        }
      });
    };

    Swal.fire({
      title: '<h4 class="fw-bold mb-0">Eliminar servicio?</h4>',
      html: `<p class="text-muted mt-2 mb-0">Vas a eliminar <strong>${name}</strong> de forma permanente. Esta accion no se puede deshacer.</p>`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '<i class="fas fa-trash-alt me-2"></i>Si, eliminar',
      cancelButtonText: 'Cancelar',
      reverseButtons: true,
      confirmButtonColor: '#e74a3b',
      cancelButtonColor: '#858796',
      customClass: {
        confirmButton: 'btn btn-danger px-4 py-2 fw-bold',
        cancelButton: 'btn btn-light px-4 py-2 fw-bold'
      },
      buttonsStyling: false
    }).then((result) => {
      if (result.isConfirmed) {
        executeDelete();
      }
    });
  };

  htmx.on("htmx:configRequest", (e) => {
    const token = document.querySelector('input[name="csrfmiddlewaretoken"]')?.value;
    if (token) {
      e.detail.headers["X-CSRFToken"] = token;
    }
  });


  function resetNewServiceForm() {
    const form = document.getElementById("newServiceForm");
    if (!form) return;
    form.reset();
    const errors = document.getElementById("form-errors");
    if (errors) {
      errors.innerHTML = "";
      errors.style.display = "none";
    }
    const modalErrors = document.getElementById("modal-form-errors");
    if (modalErrors) {
      modalErrors.innerHTML = "";
      modalErrors.style.display = "none";
    }
    ["dockerfile", "compose", "code"].forEach((name) => {
      const input = document.querySelector(`input[name="${name}"]`);
      if (input) {
        input.value = "";
        input.disabled = false;
      }
    });
    if (typeof applyMode === 'function') applyMode();
    document.querySelectorAll('[data-bs-toggle="popover"]').forEach((el) => {
      const inst = bootstrap.Popover.getInstance(el);
      if (inst) inst.hide();
    });
  }

  function clearFile(name) {
    const input = document.querySelector(`input[name="${name}"]`);
    if (input) {
      input.value = "";
      // Disparar evento de cambio para que syncExclusion se entere
      input.dispatchEvent(new Event("change"));
    }
  }

  function clearCustomPort() {
    const input = document.getElementById("service-port");
    if (input) input.value = "";
    const feedback = document.getElementById("port-availability-feedback");
    if (feedback) {
      feedback.innerHTML = "";
      feedback.style.display = "none";
    }
  }

  function clearDockerHubField() {
    const input = document.getElementById("service-dockerhub");
    if (input) input.value = "";
    const feedback = document.getElementById("dockerhub-feedback");
    if (feedback) {
      feedback.innerHTML = "";
      feedback.style.display = "none";
    }
  }

  document.body.addEventListener("service:modal-close", (evt) => {
    const modalId = evt.detail?.modalId || "newServiceModal";
    const modalEl = document.getElementById(modalId);
    if (!modalEl) return;
    const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
    modal.hide();
    resetNewServiceForm();
  });

  document.addEventListener("service:toast", (evt) => {
    const detail = evt.detail || {};
    showToast(
      detail.message || "Operacion completada",
      detail.variant || "text-bg-success",
      detail.title || null
    );
  });

  document.body.addEventListener("showValidationError", (evt) => {
    let message = "";
    if (evt.detail) {
      if (typeof evt.detail === "string") {
        message = evt.detail;
      } else if (evt.detail.showValidationError) {
        message = evt.detail.showValidationError;
      } else if (evt.detail.value) {
        message = evt.detail.value;
      } else {
        message = JSON.stringify(evt.detail);
      }
    }
    if (!message || message === "{}") {
      message = "Error desconocido al crear el servicio";
    }
    const modalErrorContainer = document.getElementById("modal-form-errors");
    const pageErrorContainer = document.getElementById("form-errors");
    const errorHTML = `
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <div class="d-flex align-items-start">
          <i class="fas fa-exclamation-triangle fs-4 me-3 mt-1" style="color: #dc3545;"></i>
          <div class="flex-grow-1">
            <strong class="d-block mb-1">No se pudo crear el servicio</strong>
            <div class="small">${message}</div>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    `;
    if (modalErrorContainer) {
      modalErrorContainer.innerHTML = errorHTML;
      modalErrorContainer.style.display = "block";
    } else if (pageErrorContainer) {
      pageErrorContainer.innerHTML = errorHTML;
      pageErrorContainer.style.display = "block";
      pageErrorContainer.scrollIntoView({ behavior: "smooth", block: "center" });
    } else {
      alert("Error de Validacion\n\n" + message);
    }
  });

  // Funcion para actualizar el resaltado de las cards de modo
  function updateModeCardSelection() {
    document.querySelectorAll(".mode-card").forEach((card) => {
      const radio = card.querySelector('input[type="radio"]');
      if (radio && radio.checked) {
        card.classList.add("selected");
      } else {
        card.classList.remove("selected");
      }
    });
  }

  function applyMode() {
    try {
      const mode = document.querySelector('input[name="mode"]:checked')?.value || "default";
      const submode = document.querySelector('input[name="custom_subtype"]:checked')?.value || "dockerfile";
      
      const imgSel = document.getElementById("service-image");
      const dockerhubInput = document.getElementById("service-dockerhub");
      const dockerfile = document.querySelector('input[name="dockerfile"]');
      const compose = document.querySelector('input[name="compose"]');
      const code = document.querySelector('input[name="code"]');
      const internalPort = document.querySelector('input[name="internal_port"]');
      const customPort = document.querySelector('input[name="custom_port"]');
      
      const imageContainer = document.getElementById("block-default-image");
      const dockerhubBlock = document.getElementById("block-dockerhub-mode");
      const customSubtypeBlock = document.getElementById("block-custom-subtype");
      const dockerfileBlock = document.getElementById("block-dockerfile");
      const composeBlock = document.getElementById("block-compose");
      const codeBlock = document.getElementById("block-code");
      const analysisBlock = document.getElementById("block-analysis");

      // Limpieza de estados visuales
      [imageContainer, dockerhubBlock, customSubtypeBlock, dockerfileBlock, composeBlock, codeBlock, analysisBlock].forEach(el => {
        if (el) el.style.display = "none";
      });

      // --- LOGICA DE LIMPIEZA Y HABILITACION ---
      
      if (mode === "default") {
        if (imageContainer) imageContainer.style.display = "block";
        if (imgSel) { imgSel.disabled = false; imgSel.required = true; }
        
        if (dockerhubInput) { dockerhubInput.disabled = true; dockerhubInput.required = false; }
        if (dockerfile) { dockerfile.disabled = true; }
        if (compose) { compose.disabled = true; }
        if (code) { code.required = false; }
      } else if (mode === "dockerhub") {
        if (dockerhubBlock) dockerhubBlock.style.display = "block";
        if (dockerhubInput) {
          dockerhubInput.disabled = false;
          dockerhubInput.required = true;
        }
        if (imgSel) { imgSel.disabled = true; imgSel.required = false; }
        if (dockerfile) { dockerfile.disabled = true; }
        if (code) { code.required = false; }
      } else if (mode === "custom") {
        if (customSubtypeBlock) customSubtypeBlock.style.display = "block";
        if (codeBlock) codeBlock.style.display = "block";
        if (code) { code.required = true; }
        
        // Deshabilitar selectores de imagen no usados en modo custom
        if (imgSel) { imgSel.disabled = true; imgSel.required = false; }
        if (dockerhubInput) { dockerhubInput.disabled = true; dockerhubInput.required = false; }
        
        if (submode === "dockerfile") {
          if (dockerfileBlock) dockerfileBlock.style.display = "block";
          if (dockerfile) dockerfile.disabled = false;
          if (compose) compose.disabled = true;
        } else { // submode === "compose"
          if (composeBlock) composeBlock.style.display = "block";
          if (compose) compose.disabled = false;
          if (dockerfile) dockerfile.disabled = true;
        }
      }

      // Gestion de Visibilidad y Tipado (Simple vs Advanced)
      const simpleAccessBlock = document.getElementById("block-simple-access-config");
      const portConfigBlock = document.getElementById("block-port-config");

      if (mode === "dockerhub" || (mode === "custom" && submode === "dockerfile")) {
          // Relocalización dinámica según UX solicitada
          if (simpleAccessBlock) {
              if (mode === "dockerhub" && portConfigBlock) {
                  portConfigBlock.parentNode.insertBefore(simpleAccessBlock, portConfigBlock);
              } else if (mode === "custom" && codeBlock) {
                  codeBlock.parentNode.insertBefore(simpleAccessBlock, codeBlock);
              }
              simpleAccessBlock.style.display = "block";
          }
          if (analysisBlock) analysisBlock.style.display = "none";
          if (portConfigBlock) portConfigBlock.style.display = "block";
      } else if (mode === "custom" && submode === "compose") {
          if (simpleAccessBlock) simpleAccessBlock.style.display = "none";
          if (portConfigBlock) portConfigBlock.style.display = "none";
          // El analysisBlock se muestra tras el fetch exitoso
          if (compose && compose.files && compose.files.length > 0) {
              requestComposeAnalysis(compose.files[0]);
          }
      } else {
          if (simpleAccessBlock) simpleAccessBlock.style.display = "none";
          if (analysisBlock) analysisBlock.style.display = "none";
          if (portConfigBlock) portConfigBlock.style.display = "none";
      }

      // Gestion de Ejemplos en Sidebar
      document.querySelectorAll(".example-block").forEach(b => b.style.display = "none");
      const exampleId = mode === "default" ? "example-default" : 
                        mode === "dockerhub" ? "example-dockerhub" :
                        submode === "dockerfile" ? "example-custom-dockerfile" : "example-custom-compose";
      const ex = document.getElementById(exampleId);
      if (ex) ex.style.display = "block";

      if (internalPort) internalPort.disabled = (mode === "default");
    } catch (e) {
      console.error("Error in applyMode:", e);
    }
  }



  async function verifyDockerHubImage() {
    const input = document.getElementById("service-dockerhub");
    const feedback = document.getElementById("dockerhub-feedback");
    const btn = document.getElementById("verify-dockerhub-btn");
    const imageName = input.value.trim();

    if (!imageName) {
      feedback.innerHTML = '<div class="alert alert-warning mb-0"><i class="fas fa-exclamation-circle me-2"></i>Por favor, ingresa un nombre de imagen</div>';
      feedback.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Verificando...';
    feedback.innerHTML = '<div class="alert alert-info mb-0"><i class="fas fa-spinner fa-spin me-2"></i>Consultando DockerHub...</div>';
    feedback.style.display = "block";

    try {
      const response = await fetch(`/paasify/containers/verify-dockerhub/?image=${encodeURIComponent(imageName)}`);
      const data = await response.json();
      if (data.success) {
        const lastUpdated = data.last_updated ? new Date(data.last_updated).toLocaleDateString("es-ES") : "Desconocida";
        const sizeInMB = data.full_size ? (data.full_size / (1024 * 1024)).toFixed(2) : "Desconocido";
        let portInfo = "";
        if (data.exposed_port) {
          portInfo = `<br><strong>Puerto detectado:</strong> <code>${data.exposed_port}</code>
                      <button type="button" class="btn btn-sm btn-outline-success ms-2" onclick="document.getElementById('service-internal-port').value = '${data.exposed_port}'">
                        <i class="fas fa-magic me-1"></i> Usar este puerto
                      </button>`;
        }
        feedback.innerHTML = `<div class="alert alert-success mb-0">
                                <i class="fas fa-check-circle me-2"></i><strong>Imagen encontrada en DockerHub</strong><br>
                                <small class="text-muted">
                                  <strong>Nombre:</strong> <code>${imageName}</code><br>
                                  <strong>Ultima actualizacion:</strong> ${lastUpdated}<br>
                                  <strong>Tamaño:</strong> ${sizeInMB} MB ${portInfo}
                                </small>
                              </div>`;
      } else {
        feedback.innerHTML = `<div class="alert alert-danger mb-0"><i class="fas fa-times-circle me-2"></i><strong>${data.error}</strong></div>`;
      }
    } catch (error) {
      feedback.innerHTML = `<div class="alert alert-danger mb-0"><i class="fas fa-exclamation-triangle me-2"></i><strong>Error al verificar</strong><br><small>${error.message}</small></div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Verificar';
    }
  }

  function checkPortAvailability() {
    const portInput = document.getElementById("service-port");
    const feedback = document.getElementById("port-availability-feedback");
    const port = portInput?.value.trim();
    if (!port) return;

    fetch(`/paasify/containers/check-port/?port=${encodeURIComponent(port)}`)
      .then(r => r.json())
      .then(data => {
        if (data.success && data.available) {
          feedback.innerHTML = `<div class="alert alert-success mb-0"><strong>${data.message}</strong></div>`;
        } else {
          let suggestionsHTML = "";
          if (data.suggestions?.length) {
            suggestionsHTML = `<div class="mt-2"><strong>Sugerencias:</strong><div class="d-flex gap-2 mt-2">` +
              data.suggestions.map(p => `<button type="button" class="btn btn-sm btn-outline-success" onclick="document.getElementById('service-port').value='${p}';checkPortAvailability();">${p}</button>`).join("") +
              `</div></div>`;
          }
          feedback.innerHTML = `<div class="alert alert-warning mb-0">${data.message || data.error}${suggestionsHTML}</div>`;
        }
        feedback.style.display = "block";
      });
  }

  document.addEventListener("DOMContentLoaded", () => {
    // Inicializacion de estado
    updateModeCardSelection();
    applyMode();

    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener("change", () => {
        updateModeCardSelection();
        applyMode();
      });
    });

    // Hacer que toda la card sea clickeable
    document.querySelectorAll(".mode-card").forEach((card) => {
      card.addEventListener("click", function () {
        const radio = this.querySelector('input[type="radio"]');
        if (radio) {
          radio.checked = true;
          radio.dispatchEvent(new Event("change"));
        }
      });
    });

    // Manejar selección de tipo de contenedor vía botones
    document.querySelectorAll(".btn-type-sel").forEach(btn => {
      btn.addEventListener("click", function() {
        // Quitar active de todos
        document.querySelectorAll(".btn-type-sel").forEach(b => b.classList.remove("active"));
        // Poner active al actual
        this.classList.add("active");
        // Actualizar input oculto
        const type = this.getAttribute("data-type");
        const input = document.getElementById("input_container_type");
        if (input) input.value = type;
        
        // Auto-sincronizar is_web (opcional: si es DB, desactivar web por defecto)
        const webSwitch = document.getElementById("is_web_simple");
        if (webSwitch) {
            if (type === "database") {
                webSwitch.checked = false;
            } else if (type === "web") {
                webSwitch.checked = true;
            }
        }
      });
    });
    
    const dockerfile = document.querySelector('input[name="dockerfile"]');
    const compose = document.querySelector('input[name="compose"]');
    if (dockerfile) dockerfile.addEventListener("change", applyMode);
    if (compose) {
        compose.addEventListener("change", function(e) {
            if (this.files.length > 0) {
                requestComposeAnalysis(this.files[0]);
            } else {
                const analysisBlock = document.getElementById("block-analysis");
                if (analysisBlock) analysisBlock.style.display = "none";
            }
        });
    }

    const form = document.getElementById("newServiceForm");
    if (form) {
        form.addEventListener("submit", function(e) {
            // Recolectar configuraciones de contenedores (si es modo compose)
            const analysisBlock = document.getElementById("block-analysis");
            if (analysisBlock && analysisBlock.style.display !== "none") {
                const configs = {};
                const rows = document.querySelectorAll("#analysis-table-body tr");
                rows.forEach(row => {
                    const name = row.dataset.containerName;
                    const type = row.querySelector(".container-type-select").value;
                    const isWeb = row.querySelector(".is-web-switch").checked;
                    configs[name] = { container_type: type, is_web: isWeb };
                });
                const hiddenInput = document.getElementById("final-container-configs");
                if (hiddenInput) hiddenInput.value = JSON.stringify(configs);
            }
        });
    }

  async function requestComposeAnalysis(file) {
    const analysisBlock = document.getElementById("block-analysis");
    const tbody = document.getElementById("analysis-table-body");
    const warningsDiv = document.getElementById("analysis-warnings");
    const errorsDiv = document.getElementById("analysis-errors");

    if (!analysisBlock || !tbody) return;

    analysisBlock.style.display = "block";
    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4"><i class="fas fa-spinner fa-spin me-2"></i>Analizando docker-compose...</td></tr>';
    warningsDiv.innerHTML = "";
    errorsDiv.innerHTML = "";

    const formData = new FormData();
    formData.append("compose_file", file);

    try {
      const response = await fetch("/paasify/containers/analyze-compose/", {
        method: "POST",
        body: formData,
        headers: {
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value
        }
      });
      const data = await response.json();
      
      if (data.success) {
        displayComposeAnalysis(data);
      } else {
        analysisBlock.style.display = "none";
        showToast(data.message || data.error, "text-bg-danger", "Error de Análisis");
      }
    } catch (error) {
      console.error(error);
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error de red al analizar archivo</td></tr>';
    }
  }

  function displayComposeAnalysis(data) {
    const tbody = document.getElementById("analysis-table-body");
    const warningsDiv = document.getElementById("analysis-warnings");
    tbody.innerHTML = "";

    data.containers.forEach(c => {
      const row = document.createElement("tr");
      row.dataset.containerName = c.name;
      
      const typeOptions = [
        { val: 'web', label: '🌐 &nbsp; Web / Frontend' },
        { val: 'api', label: '⚙️ &nbsp; API / Backend' },
        { val: 'database', label: '🗄️ &nbsp; Base de Datos' },
        { val: 'misc', label: '🛡️ &nbsp; General' }
      ];

      const optionsHtml = typeOptions.map(opt => 
        `<option value="${opt.val}" ${c.container_type === opt.val ? 'selected' : ''}>${opt.label}</option>`
      ).join("");

      // Generar badges de puertos desde el backend
      let portsHtml = '';
      if (c.ports && c.ports.length > 0) {
        portsHtml = c.ports.map(p => {
          // p.host puede ser "auto" o un número específico
          // p.container es el puerto interno
          if (p.host === 'auto') {
            return `<span class="badge bg-secondary font-monospace me-1">${p.container}/tcp</span>`;
          } else {
            return `<span class="badge bg-primary font-monospace me-1"><i class="fas fa-link me-1"></i>${p.host}→${p.container}</span>`;
          }
        }).join('');
      }
      if (!portsHtml) {
        portsHtml = '<span class="text-muted small">Sin puertos</span>';
      }

      row.innerHTML = `
        <td class="ps-3"><strong class="text-primary">${c.name}</strong></td>
        <td><code class="small">${c.image}</code></td>
        <td>${portsHtml}</td>
        <td>
          <select class="form-select form-select-sm container-type-select">
            ${optionsHtml}
          </select>
        </td>
        <td class="text-center">
          <div class="form-check form-switch d-inline-block">
            <input class="form-check-input is-web-switch" type="checkbox" ${c.is_web ? 'checked' : ''}>
          </div>
        </td>
      `;
      tbody.appendChild(row);

      if (c.warnings && c.warnings.length > 0) {
        c.warnings.forEach(w => {
            const al = document.createElement("div");
            al.className = "alert alert-info py-1 px-2 small mb-1";
            al.innerHTML = `<i class="fas fa-info-circle me-2"></i><strong>${c.name}:</strong> ${w}`;
            warningsDiv.appendChild(al);
        });
      }
    });

    if (data.warnings && data.warnings.length > 0) {
        data.warnings.forEach(w => {
            const al = document.createElement("div");
            al.className = "alert alert-warning py-1 px-2 small mb-1";
            al.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i> ${w}`;
            warningsDiv.appendChild(al);
        });
    }

    // Listener para actualizar el JSON en tiempo real al cambiar cualquier input
    tbody.querySelectorAll("select, input").forEach(el => {
        el.addEventListener("change", updateContainerConfigsJson);
    });

    // Actualizar el JSON inicial con los valores detectados
    updateContainerConfigsJson();
  }

  function updateContainerConfigsJson() {
    const analysisBlock = document.getElementById("block-analysis");
    if (!analysisBlock || analysisBlock.style.display === "none") return;

    const configs = {};
    const rows = document.querySelectorAll("#analysis-table-body tr");
    rows.forEach(row => {
        const name = row.dataset.containerName;
        // Protección contra filas sin datos
        if (!name) return;
        
        const typeSelect = row.querySelector(".container-type-select");
        const webSwitch = row.querySelector(".is-web-switch");
        
        if (typeSelect && webSwitch) {
            configs[name] = { 
                container_type: typeSelect.value, 
                is_web: webSwitch.checked 
            };
        }
    });

    const hiddenInput = document.getElementById("final-container-configs");
    if (hiddenInput) {
        hiddenInput.value = JSON.stringify(configs);
        console.log("Configs actualizados:", hiddenInput.value); // Depuración
    }
  }


    // Filtrar proyectos por asignatura
    const subjectSelect = document.getElementById("service-subject");
    const projectSelect = document.getElementById("service-project");
    if (subjectSelect && projectSelect) {
      const allProjectOptions = Array.from(projectSelect.options);
      subjectSelect.addEventListener("change", function () {
        const selectedId = this.value;
        projectSelect.innerHTML = "";
        const defOpt = document.createElement("option");
        defOpt.value = "";
        defOpt.disabled = true;
        defOpt.selected = true;
        defOpt.textContent = "Selecciona un proyecto";
        projectSelect.appendChild(defOpt);

        allProjectOptions.forEach(opt => {
          if (opt.dataset.subjectId === selectedId) {
            projectSelect.appendChild(opt.cloneNode(true));
          }
        });

        if (projectSelect.options.length === 1) {
          const noOpt = document.createElement("option");
          noOpt.value = "";
          noOpt.disabled = true;
          noOpt.textContent = "No hay proyectos en esta asignatura";
          projectSelect.appendChild(noOpt);
        }
      });
      if (subjectSelect.value) subjectSelect.dispatchEvent(new Event("change"));
    }

    // Lógica para las cards de sub-tipo
    document.querySelectorAll('input[name="custom_subtype"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        document.querySelectorAll(".subtype-card").forEach((card) => {
          const r = card.querySelector('input[type="radio"]');
          if (r && r.checked) card.classList.add("selected");
          else card.classList.remove("selected");
        });
        applyMode();
      });
    });

    document.querySelectorAll(".subtype-card").forEach((card) => {
      card.addEventListener("click", function () {
        const radio = this.querySelector('input[type="radio"]');
        if (radio) {
          radio.checked = true;
          radio.dispatchEvent(new Event("change"));
        }
      });
    });

    // Notificacion de exito al crear
    const params = new URLSearchParams(window.location.search);
    if (params.has("created")) {
      showToast("El servicio se ha creado correctamente y se esta iniciando.", "text-bg-success", "Servicio Creado!");
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    // Tooltips y Popovers
    document.querySelectorAll('[data-bs-toggle="popover"]').forEach(el => new bootstrap.Popover(el));
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
  });
</script>
