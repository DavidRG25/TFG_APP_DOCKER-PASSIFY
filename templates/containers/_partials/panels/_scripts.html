<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function copyToClipboard(elementSelector) {
    const element = document.querySelector(elementSelector);
    if (!element) return;
    element.select();
    document.execCommand("copy");
    showToast("¡Copiado!");
  }

  // Confirmación de eliminación (Totalmente blindada contra refrescos de tabla)
  window.confirmDelete = function(elt) {
    if (!elt) return;

    // 1. Capturamos los datos críticos ANTES de mostrar el modal
    const name = elt.getAttribute("data-service-name") || "este servicio";
    const deleteUrl = elt.getAttribute("hx-post");
    const targetId = elt.getAttribute("hx-target"); // ej: #service-178
    
    // 2. Definimos la acción de borrado
    const executeDelete = () => {
        if (!window.htmx) return;
        
        // Buscamos el objetivo actual en el DOM (por si la tabla se refrescó)
        const currentTarget = document.querySelector(targetId);
        
        htmx.ajax("POST", deleteUrl, {
            target: targetId,
            swap: "outerHTML",
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value
            }
        });
    };

    // 3. Mostramos la confirmación
    if (window.swal) {
      swal({
        title: "¿Eliminar servicio?",
        text: `Vas a eliminar "${name}" de forma permanente. Esta acción no se puede deshacer.`,
        icon: "warning",
        buttons: ["Cancelar", "Sí, eliminar"],
        dangerMode: true,
      }).then((confirmed) => {
        if (confirmed) {
          executeDelete();
        }
      });
    } else {
      if (confirm(`¿Eliminar ${name}?`)) executeDelete();
    }
  };

  htmx.on("htmx:configRequest", (e) => {
    const token = document.querySelector(
      'input[name="csrfmiddlewaretoken"]',
    )?.value;
    if (token) {
      e.detail.headers["X-CSRFToken"] = token;
    }
  });

  function showToast(message, variant = "text-bg-success", title = null) {
    const box = document.getElementById("global-alert-container");
    if (!box) return;

    const variantMap = {
      "text-bg-success": "success",
      "text-bg-danger": "danger",
      "text-bg-warning": "warning",
      "text-bg-info": "info",
      "text-bg-primary": "primary"
    };
    
    const v = variantMap[variant] || "success";
    const config = {
      "success": { icon: "fa-check", title: "¡Éxito!" },
      "danger": { icon: "fa-times", title: "Error" },
      "warning": { icon: "fa-exclamation-triangle", title: "Atención" },
      "info": { icon: "fa-info-circle", title: "Información" },
      "primary": { icon: "fa-rocket", title: "Procesando" }
    };

    const c = config[v];
    const displayTitle = title || c.title;

    const banner = document.createElement("div");
    banner.className = `alert alert-${v} border-0 shadow-lg d-flex align-items-center show fade mb-2`;
    banner.style.borderLeft = `3px solid ${v === 'success' ? '#1cc88a' : (v === 'danger' ? '#e74a3b' : '#f6c23e')}`;
    banner.style.width = "fit-content";
    banner.style.minWidth = "230px";
    banner.style.maxWidth = "380px";
    banner.style.backgroundColor = "white";
    banner.style.borderRadius = "6px";
    banner.style.pointerEvents = "auto";
    
    banner.innerHTML = `
      <div class="d-flex align-items-center w-100 p-2 px-3">
        <div class="bg-${v} rounded-circle p-1 me-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 20px; height: 20px; min-width: 20px;">
          <i class="fas ${c.icon} text-white" style="font-size: 0.55rem;"></i>
        </div>
        <div class="flex-grow-1 text-start">
          <div class="fw-bold text-${v}" style="letter-spacing: -0.2px; line-height: 1.1; font-size: 0.76rem;">${displayTitle}</div>
          <div class="text-dark opacity-75 mt-1" style="font-size: 0.7rem; line-height: 1.2;">${message}</div>
        </div>
        <button type="button" class="btn btn-link text-muted p-0 ms-3" data-bs-dismiss="alert" aria-label="Close" style="text-decoration: none; opacity: 0.3;">
          <i class="fas fa-times" style="font-size: 0.6rem;"></i>
        </button>
      </div>
    `;

    // Insertar al principio para que se vea arriba
    box.prepend(banner);

    // Auto-eliminar después de 4 segundos
    setTimeout(() => {
      const bsAlert = new bootstrap.Alert(banner);
      if (banner.parentNode) bsAlert.close();
    }, 4500);
  }

  function resetNewServiceForm() {
    const form = document.getElementById("newServiceForm");
    if (!form) return;
    form.reset();

    // Limpiar errores (ambos contenedores por si acaso)
    const errors = document.getElementById("form-errors");
    if (errors) errors.innerHTML = "";
    const modalErrors = document.getElementById("modal-form-errors");
    if (modalErrors) modalErrors.innerHTML = "";

    ["dockerfile", "compose", "code"].forEach((name) => {
      const input = document.querySelector(`input[name="${name}"]`);
      if (input) {
        input.value = "";
        input.disabled = false;
        input.dispatchEvent(new Event("change"));
      }
    });
    applyMode();
    syncExclusion();
    document.querySelectorAll('[data-bs-toggle="popover"]').forEach((el) => {
      const inst = bootstrap.Popover.getInstance(el);
      if (inst) inst.hide();
    });
  }

  document.body.addEventListener("service:modal-close", (evt) => {
    const modalId = evt.detail?.modalId || "newServiceModal";
    const modalEl = document.getElementById(modalId);
    if (!modalEl) return;
    (
      bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl)
    ).hide();
    resetNewServiceForm();
  });

  document.addEventListener("service:toast", (evt) => {
    const detail = evt.detail || {};
    showToast(
      detail.message || "Operación completada",
      detail.variant || "text-bg-success",
    );
  });

  // Listener para errores de validación
  document.body.addEventListener("showValidationError", (evt) => {
    // Extraer mensaje correctamente del evento HTMX
    let message = "";

    if (evt.detail) {
      // HTMX envía el mensaje en evt.detail directamente cuando es un string
      if (typeof evt.detail === "string") {
        message = evt.detail;
      }
      // O en evt.detail.showValidationError cuando viene del HX-Trigger
      else if (evt.detail.showValidationError) {
        message = evt.detail.showValidationError;
      }
      // O en evt.detail.value
      else if (evt.detail.value) {
        message = evt.detail.value;
      }
      // Último recurso
      else {
        message = JSON.stringify(evt.detail);
      }
    }

    if (!message || message === "{}") {
      message = "Error desconocido al crear el servicio";
    }

    // Buscar el contenedor en el modal (si existe)
    const modalErrorContainer = document.getElementById("modal-form-errors");
    // Buscar el contenedor en la página
    const pageErrorContainer = document.getElementById("form-errors");

    const errorHTML = `
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <div class="d-flex align-items-start">
          <i class="fas fa-exclamation-triangle fs-4 me-3 mt-1" style="color: #dc3545;"></i>
          <div class="flex-grow-1">
            <strong class="d-block mb-1">❌ No se pudo crear el servicio</strong>
            <div class="small">
              ${message}
            </div>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    `;

    if (modalErrorContainer) {
      // Mostrar en el modal si existe
      modalErrorContainer.innerHTML = errorHTML;
      modalErrorContainer.style.display = "block";
    } else if (pageErrorContainer) {
      // Mostrar en la página
      pageErrorContainer.innerHTML = errorHTML;
      pageErrorContainer.style.display = "block";
      // Hacer scroll al error
      pageErrorContainer.scrollIntoView({
        behavior: "smooth",
        block: "center",
      });
    } else {
      // Fallback a alert solo si no existe ningún contenedor
      alert("❌ Error de Validación\n\n" + message);
    }
  });

  const newServiceModal = document.getElementById("newServiceModal");
  if (newServiceModal) {
    newServiceModal.addEventListener("hidden.bs.modal", () => {
      resetNewServiceForm();
    });
  }

  htmx.on("htmx:afterRequest", (evt) => {
    if (evt.detail?.requestConfig?.elt?.id === "newServiceForm") {
      const status = evt.detail.xhr?.status || 0;
      if (status < 400) {
        resetNewServiceForm();
        if (newServiceModal) {
          (
            bootstrap.Modal.getInstance(newServiceModal) ||
            new bootstrap.Modal(newServiceModal)
          ).hide();
        }
      }
    }
  });

  htmx.on("htmx:responseError", (evt) => {
    const xhr = evt.detail.xhr;
    const status = xhr?.status ?? 0;
    const msg = xhr?.responseText || "Se produjo un error inesperado";
    showToast(`Error (${status}): ${msg}`, "text-bg-danger");
  });

  function applyMode() {
    const mode =
      document.querySelector('input[name="mode"]:checked')?.value || "default";

    // Buscar elementos por ID para mayor precisión
    const imgSel = document.getElementById("service-image");
    const dockerhubInput = document.getElementById("service-dockerhub");

    const dockerfile = document.querySelector('input[name="dockerfile"]');
    const compose = document.querySelector('input[name="compose"]');
    const code = document.querySelector('input[name="code"]');
    const internalPort = document.querySelector('input[name="internal_port"]');
    const customPort = document.querySelector('input[name="custom_port"]');

    // Obtener los contenedores de los campos
    const imageContainer = document.getElementById("block-default-image");
    const customBlocks = document.querySelectorAll(".custom-block");
    const dockerhubBlock = document.getElementById("block-dockerhub-mode");

    if (mode === "default") {
      // Modo default: Mostrar imagen del catálogo
      if (imageContainer) imageContainer.style.display = "block";
      if (dockerhubBlock) dockerhubBlock.style.display = "none";

      if (imgSel) imgSel.disabled = false;
      if (dockerhubInput) {
        dockerhubInput.disabled = true;
        dockerhubInput.removeAttribute("required"); // No obligatorio en modo default
      }

      // Limpiar feedback de DockerHub
      const dockerhubFeedback = document.getElementById("dockerhub-feedback");
      if (dockerhubFeedback) {
        dockerhubFeedback.innerHTML = "";
        dockerhubFeedback.style.display = "none";
      }

      customBlocks.forEach((b) => {
        b.style.display = "none";
      });

      [dockerfile, compose, code].forEach((input) => {
        if (!input) return;
        input.disabled = true;
        input.value = "";
        input.dispatchEvent(new Event("change"));
      });
    } else if (mode === "dockerhub") {
      // Modo DockerHub: Mostrar solo campo de DockerHub
      if (imageContainer) imageContainer.style.display = "none";
      if (dockerhubBlock) dockerhubBlock.style.display = "block";

      if (imgSel) imgSel.disabled = true;
      if (dockerhubInput) {
        dockerhubInput.disabled = false;
        dockerhubInput.required = true; // Hacer obligatorio en modo DockerHub
      }

      customBlocks.forEach((b) => {
        b.style.display = "none";
      });

      [dockerfile, compose, code].forEach((input) => {
        if (!input) return;
        input.disabled = true;
        input.value = "";
        input.dispatchEvent(new Event("change"));
      });
    } else {
      // Modo custom: Mostrar Dockerfile/Compose/Código
      if (imageContainer) imageContainer.style.display = "none";
      if (dockerhubBlock) dockerhubBlock.style.display = "none";

      if (imgSel) imgSel.disabled = true;
      if (dockerhubInput) {
        dockerhubInput.disabled = true;
        dockerhubInput.removeAttribute("required"); // No obligatorio en modo custom
      }

      // Limpiar feedback de DockerHub
      const dockerhubFeedback = document.getElementById("dockerhub-feedback");
      if (dockerhubFeedback) {
        dockerhubFeedback.innerHTML = "";
        dockerhubFeedback.style.display = "none";
      }

      customBlocks.forEach((b) => {
        b.style.display = "block";
      });

      [dockerfile, compose, code].forEach((input) => {
        if (input) input.disabled = false;
      });
    }

    // IMPORTANTE: Los puertos SIEMPRE deben estar habilitados si el modo lo permite
    if (internalPort) internalPort.disabled = false;
    if (customPort) customPort.disabled = false;

    syncExclusion();
  }

  function syncExclusion() {
    const dockerfile = document.querySelector('input[name="dockerfile"]');
    const compose = document.querySelector('input[name="compose"]');
    const mode =
      document.querySelector('input[name="mode"]:checked')?.value || "default";

    // Obtener contenedores de los bloques
    const dockerfileBlock = document.getElementById("block-dockerfile");
    const composeBlock = document.getElementById("block-compose");

    // Solo aplicar exclusión en modo custom
    if (mode !== "custom") {
      return;
    }

    // Lógica de exclusión en modo custom - OCULTAR en lugar de deshabilitar
    // Si hay Dockerfile, ocultar compose
    if (dockerfile.files?.length) {
      if (composeBlock) composeBlock.style.display = "none";
      compose.value = "";
    }
    // Si hay compose, ocultar dockerfile
    else if (compose.files?.length) {
      if (dockerfileBlock) dockerfileBlock.style.display = "none";
      dockerfile.value = "";
    }
    // Si no hay nada, mostrar todo
    else {
      if (dockerfileBlock) dockerfileBlock.style.display = "block";
      if (composeBlock) composeBlock.style.display = "block";
    }
  }

  // Función para verificar si una imagen existe en DockerHub
  async function verifyDockerHubImage() {
    const input = document.getElementById("service-dockerhub");
    const feedback = document.getElementById("dockerhub-feedback");
    const btn = document.getElementById("verify-dockerhub-btn");
    const imageName = input.value.trim();

    if (!imageName) {
      feedback.innerHTML = `
        <div class="alert alert-warning mb-0">
          <i class="fas fa-exclamation-circle me-2"></i>
          Por favor, ingresa un nombre de imagen
        </div>
      `;
      feedback.style.display = "block";
      return;
    }

    // Mostrar loading
    btn.disabled = true;
    btn.innerHTML =
      '<i class="fas fa-spinner fa-spin me-1"></i> Verificando...';
    feedback.innerHTML = `
      <div class="alert alert-info mb-0">
        <i class="fas fa-spinner fa-spin me-2"></i>
        Consultando DockerHub...
      </div>
    `;
    feedback.style.display = "block";

    try {
      // Usar endpoint de Django para evitar CORS
      const response = await fetch(
        `/paasify/containers/verify-dockerhub/?image=${encodeURIComponent(imageName)}`,
      );
      const data = await response.json();

      if (data.success) {
        const lastUpdated = data.last_updated
          ? new Date(data.last_updated).toLocaleDateString("es-ES")
          : "Desconocida";
        const sizeInMB = data.full_size
          ? (data.full_size / (1024 * 1024)).toFixed(2)
          : "Desconocido";

        let portInfo = "";
        if (data.exposed_port) {
          portInfo = `
            <br>
            <strong>Puerto detectado:</strong> <code>${data.exposed_port}</code>
            <button 
              type="button" 
              class="btn btn-sm btn-outline-success ms-2"
              onclick="document.getElementById('service-internal-port').value = '${data.exposed_port}'"
            >
              <i class="fas fa-magic me-1"></i> Usar este puerto
            </button>
          `;
        }

        feedback.innerHTML = `
          <div class="alert alert-success mb-0">
            <i class="fas fa-check-circle me-2"></i>
            <strong>✅ Imagen encontrada en DockerHub</strong>
            <br>
            <small class="text-muted">
              <strong>Nombre:</strong> <code>${imageName}</code><br>
              <strong>Última actualización:</strong> ${lastUpdated}<br>
              <strong>Tamaño:</strong> ${sizeInMB} MB
              ${portInfo}
            </small>
          </div>
        `;
      } else {
        feedback.innerHTML = `
          <div class="alert alert-danger mb-0">
            <i class="fas fa-times-circle me-2"></i>
            <strong>❌ ${data.error}</strong>
          </div>
        `;
      }
    } catch (error) {
      feedback.innerHTML = `
        <div class="alert alert-danger mb-0">
          <i class="fas fa-exclamation-triangle me-2"></i>
          <strong>Error al verificar</strong>
          <br>
          <small>${error.message}</small>
        </div>
      `;
    } finally {
      btn.disabled = false;
      btn.innerHTML =
        '<i class="fas fa-check-circle me-1" style="margin-right: 0.3rem;"></i> Verificar';
    }
  }

  function clearDockerHubField() {
    const input = document.getElementById("service-dockerhub");
    const feedback = document.getElementById("dockerhub-feedback");
    if (input) input.value = "";
    if (feedback) {
      feedback.innerHTML = "";
      feedback.style.display = "none";
    }
  }

  async function checkPortAvailability() {
    const portInput = document.getElementById("service-port");
    const feedback = document.getElementById("port-availability-feedback");
    const btn = document.getElementById("check-port-btn");

    if (!portInput || !feedback || !btn) return;

    const port = portInput.value.trim();

    if (!port) {
      feedback.style.display = "block";
      feedback.innerHTML = `
        <div class="alert alert-warning mb-0">
          <i class="fas fa-exclamation-triangle me-2"></i>
          Por favor, ingresa un puerto
        </div>
      `;
      return;
    }

    btn.disabled = true;
    btn.innerHTML =
      '<i class="fas fa-spinner fa-spin me-1"></i> Verificando...';

    try {
      const response = await fetch(
        `/paasify/containers/check-port/?port=${encodeURIComponent(port)}`,
      );
      const data = await response.json();

      feedback.style.display = "block";

      if (data.success && data.available) {
        // Puerto disponible
        feedback.innerHTML = `
          <div class="alert alert-success mb-0">
            <i class="fas fa-check-circle me-2"></i>
            <strong>${data.message}</strong>
          </div>
        `;
      } else if (data.success && !data.available) {
        // Puerto ocupado, mostrar sugerencias
        let suggestionsHTML = "";
        if (data.suggestions && data.suggestions.length > 0) {
          suggestionsHTML = `
            <div class="mt-2">
              <strong>Puertos disponibles sugeridos:</strong>
              <div class="d-flex gap-2 mt-2">
                ${data.suggestions
                  .map(
                    (p) => `
                  <button 
                    type="button" 
                    class="btn btn-sm btn-outline-success"
                    onclick="document.getElementById('service-port').value = '${p}'; checkPortAvailability();"
                  >
                    <i class="fas fa-magic me-1"></i> ${p}
                  </button>
                `,
                  )
                  .join("")}
              </div>
            </div>
          `;
        }

        feedback.innerHTML = `
          <div class="alert alert-warning mb-0">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <strong>${data.message}</strong>
            ${suggestionsHTML}
          </div>
        `;
      } else {
        // Error
        feedback.innerHTML = `
          <div class="alert alert-danger mb-0">
            <i class="fas fa-times-circle me-2"></i>
            <strong>Error:</strong> ${data.error || "Error desconocido"}
          </div>
        `;
      }
    } catch (error) {
      feedback.style.display = "block";
      feedback.innerHTML = `
        <div class="alert alert-danger mb-0">
          <i class="fas fa-exclamation-triangle me-2"></i>
          <strong>Error al verificar</strong>
          <br>
          <small>${error.message}</small>
        </div>
      `;
    } finally {
      btn.disabled = false;
      btn.innerHTML =
        '<i class="fas fa-search me-1"></i> Verificar disponibilidad';
    }
  }

  function clearCustomPort() {
    const portInput = document.getElementById("service-port");
    const feedback = document.getElementById("port-availability-feedback");

    if (portInput) portInput.value = "";
    if (feedback) {
      feedback.innerHTML = "";
      feedback.style.display = "none";
    }
  }

  function clearFile(name) {
    const input = document.querySelector(`input[name="${name}"]`);
    if (!input) return;
    const newInput = input.cloneNode(true);
    newInput.value = "";
    input.parentNode.replaceChild(newInput, input);
    newInput.addEventListener("change", syncExclusion);
    syncExclusion();
  }

  document.addEventListener("DOMContentLoaded", () => {
    applyMode();
    document.querySelectorAll('input[name="mode"]').forEach((radio) => {
      radio.addEventListener("change", applyMode);
    });
    ["dockerfile", "compose", "code"].forEach((name) => {
      const input = document.querySelector(`input[name="${name}"]`);
      if (input) input.addEventListener("change", syncExclusion);
    });
    const popoverTriggerList = Array.from(
      document.querySelectorAll('[data-bs-toggle="popover"]'),
    );
    popoverTriggerList.forEach((el) => new bootstrap.Popover(el));

    // BUGFIX: Copiar dockerhub_image a image antes de enviar el formulario
    const form = document.getElementById("newServiceForm");
    if (form) {
      form.addEventListener("submit", function (e) {
        const mode = document.querySelector(
          'input[name=\"mode\"]:checked',
        )?.value;
        if (mode === "dockerhub") {
          const dockerhubInput = document.querySelector(
            'input[name=\"dockerhub_image\"]',
          );
          const imageSelect = document.querySelector('select[name=\"image\"]');

          if (dockerhubInput && imageSelect && dockerhubInput.value.trim()) {
            // Crear una opci�n temporal con el valor de DockerHub
            const tempOption = document.createElement("option");
            tempOption.value = dockerhubInput.value.trim();
            tempOption.selected = true;
            imageSelect.appendChild(tempOption);
            imageSelect.disabled = false; // Habilitar temporalmente para que se env�e
          }
        }
      });
    }

    // Función para refrescar la tabla
    function refreshTable() {
      const tableElement = document.getElementById("service-table");
      if (tableElement && typeof htmx !== "undefined") {
        const url =
          tableElement.getAttribute("hx-get") ||
          '{% url "containers:service_table" %}';
        htmx.ajax("GET", url, {
          target: "#service-table",
          swap: "innerHTML",
        });
      }
    }

    // Calcular estadísticas desde el DOM (sin recargar página)
    function updateStatsFromTable() {
      let running = 0;
      let stopped = 0;

      // Seleccionar solo las filas directas de la tabla
      const rows = document.querySelectorAll("#service-table > tr");

      rows.forEach((row) => {
        // La columna de estado es la 5ª (índice 4) ahora: Proyecto, Nombre, Imagen, Puerto, Estado, Acciones
        const statusCell = row.children[4];
        if (!statusCell) return;

        // Buscar badges solo dentro de la celda de estado
        const badge = statusCell.querySelector(".badge");
        if (badge) {
          const text = badge.textContent.trim().toLowerCase();
          if (text.includes("running")) {
            running++;
          } else if (text.includes("stopped") || text.includes("exited")) {
            stopped++;
          }
        }
      });

      // Actualizar DOM
      const statRunning = document.getElementById("stat-running");
      const statStopped = document.getElementById("stat-stopped");

      if (statRunning) statRunning.textContent = running;
      if (statStopped) statStopped.textContent = stopped;
    }

    // Auto-refresh de la tabla cada 2 segundos
    setInterval(refreshTable, 2000);

    // State Observer: Detectar cambios de estado
    let lastServiceStates = {};

    function observeStatusChanges() {
      const rows = document.querySelectorAll("#service-table > tr[id^='service-']");
      const currentStates = {};

      rows.forEach(row => {
        const sid = row.id.replace("service-", "");
        const badge = row.querySelector(".badge");
        if (!badge) return;
        
        const status = badge.textContent.trim().toUpperCase();
        currentStates[sid] = status;

        if (lastServiceStates[sid]) {
          const name = row.querySelector(".fw-semibold")?.textContent || "su servicio";
          
          // 1. Inició correctamente (de algo que no era RUNNING a RUNNING)
          if (lastServiceStates[sid] !== "RUNNING" && status === "RUNNING") {
            showToast(`¡Buenas noticias! El servicio <strong>${name}</strong> ya está en marcha y listo para usar.`, "text-bg-success", "¡Servicio Listo!");
          }
          // 2. Parada o Fallo (de RUNNING a otra cosa)
          else if (lastServiceStates[sid] === "RUNNING" && status !== "RUNNING") {
            if (status === "ERROR") {
                showToast(`Ha ocurrido un problema al procesar <strong>${name}</strong>. Revisa los logs.`, "text-bg-danger", "Fallo en el servicio");
            } else {
                showToast(`El servicio <strong>${name}</strong> se ha detenido correctamente.`, "text-bg-warning", "Servicio Detenido");
            }
          }
        }
      });
      lastServiceStates = currentStates;
    }

    // Al terminar cualquier request HTMX de la tabla
    document.body.addEventListener("htmx:afterOnLoad", (evt) => {
      if (evt.detail.target.id === "service-table") {
        updateStatsFromTable();
        observeStatusChanges();
      }
    });


    // Detectar cambios de estado y forzar refresh inmediato de tabla
    document.body.addEventListener("htmx:afterRequest", (evt) => {
      const url = evt.detail.pathInfo.requestPath;
      if (
        url.includes("/start/") ||
        url.includes("/stop/") ||
        url.includes("/remove/")
      ) {
        setTimeout(refreshTable, 200); // Refresh tabla rápido
      }
    });
  });

  // Filtrar proyectos por asignatura seleccionada
  document.addEventListener("DOMContentLoaded", function () {
    const subjectSelect = document.getElementById("service-subject");
    const projectSelect = document.getElementById("service-project");

    if (subjectSelect && projectSelect) {
      // Guardar todas las opciones de proyecto originales
      const allProjectOptions = Array.from(projectSelect.options);

      subjectSelect.addEventListener("change", function () {
        const selectedSubjectId = this.value;

        // Limpiar el select de proyectos
        projectSelect.innerHTML = "";

        // Añadir opción por defecto
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.disabled = true;
        defaultOption.selected = true;
        defaultOption.textContent = "📁 Selecciona un proyecto";
        projectSelect.appendChild(defaultOption);

        // Filtrar y añadir solo los proyectos de la asignatura seleccionada
        allProjectOptions.forEach((option) => {
          if (option.dataset.subjectId === selectedSubjectId) {
            projectSelect.appendChild(option.cloneNode(true));
          }
        });

        // Si no hay proyectos para esta asignatura, mostrar mensaje
        if (projectSelect.options.length === 1) {
          const noProjectsOption = document.createElement("option");
          noProjectsOption.value = "";
          noProjectsOption.disabled = true;
          noProjectsOption.textContent =
            "⚠️ No hay proyectos en esta asignatura";
          projectSelect.appendChild(noProjectsOption);
        }
      });

      // Trigger inicial si hay asignatura pre-seleccionada
      if (subjectSelect.value) {
        subjectSelect.dispatchEvent(new Event("change"));
      }
    }

    // Detectar si venimos de crear un servicio para mostrar la notificación de éxito
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has("created")) {
      // Usamos el sistema global showToast para mantener el diseño unificado
      showToast(
        "El servicio se ha creado correctamente y se está iniciando en segundo plano.",
        "text-bg-success",
        "¡Servicio Creado!"
      );

      // Limpiar la URL para que no vuelva a salir el mensaje al recargar
      window.history.replaceState(
        {},
        document.title,
        window.location.pathname + window.location.hash,
      );
    }
  });
</script>
