<div class="table-responsive">
  <table class="table table-hover align-middle mb-0">
    <thead style="background: linear-gradient(90deg, #4e73df 0%, #224abe 100%);">
      <tr>
        <th class="text-white fw-semibold py-3">Nombre</th>
        <th class="text-white fw-semibold py-3">Imagen</th>
        <th class="text-white fw-semibold py-3">Puerto</th>
        <th class="text-white fw-semibold py-3">Estado</th>
        <th class="text-white fw-semibold py-3">Acciones</th>
      </tr>
    </thead>
    <tbody id="service-table" class="bg-white"
      hx-get="{% url 'containers:service_table' %}{% if current_subject %}?subject={{ current_subject.id }}{% endif %}"
      hx-trigger="load, every 3s" 
      hx-swap="innerHTML">
      {% include "containers/_service_rows.html" %}
    </tbody>
  </table>
</div>
