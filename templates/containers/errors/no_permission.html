{% extends "base.html" %}

{% block body %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center p-4" style="background: radial-gradient(circle at top right, #f8fafc, #e2e8f0);">
    <div class="card border-0 shadow-lg text-center p-5" style="max-width: 550px; border-radius: 24px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);">
        
        <div class="mb-4">
            <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                <i class="fas fa-shield-alt text-danger fs-1"></i>
            </div>
            <h1 class="fw-bold mb-2" style="color: #1e293b; letter-spacing: -1px;">{{ error_title }}</h1>
            <p class="text-muted fs-5 px-3">
                {{ error_message }}
            </p>
        </div>

        <div class="alert alert-light border border-dashed rounded-3 py-3 mb-4 mx-2" style="background: #f1f5f9;">
            <div class="d-flex align-items-center justify-content-center gap-2 text-secondary mb-1">
                <i class="fas fa-box-open small"></i> 
                <span class="small fw-semibold text-uppercase">Recurso restringido</span>
            </div>
            <div class="fw-bold text-dark fs-4">{{ service_name }}</div>
        </div>

        <div class="d-grid gap-3 px-4">
            <a href="{% url 'containers:student_panel' %}" class="btn btn-primary btn-lg rounded-pill fw-bold py-3 shadow-sm transform-hover">
                <i class="fas fa-home me-2"></i> Volver al panel principal
            </a>
            <p class="text-muted small mt-2">
                Si crees que esto es un error, contacta con tu profesor o administrador del sistema.
            </p>
        </div>
    </div>
</div>

<style>
.transform-hover {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.transform-hover:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}
.border-dashed {
    border-style: dashed !important;
}
</style>
{% endblock %}
