{% extends "base.html" %}
{% load static %}

{% block extrahead %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
{% endblock %}

{% block body %}
<h2 class="mb-4">Terminal para {{ service.name }}</h2>

<div id="terminal-container" style="height: 500px; width: 100%; background: black;"></div>

<a href="{{ return_url }}" class="btn btn-secondary mt-3">Volver</a>
{% endblock %}

{% block extrascripts %}
<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const term = new Terminal({
      cursorBlink: true,
      scrollback: 1000,
      tabStopWidth: 8,
      theme: { background: "#000000", foreground: "#ffffff" }
    });
    term.open(document.getElementById("terminal-container"));

    let currentSocket = null;
    let retryCount = 0;
    const MAX_RETRIES = 5;

    const connectSocket = () => {
      const scheme = window.location.protocol === "https:" ? "wss" : "ws";
      // Incluir query string para soportar Docker Compose (?container=X)
      const queryString = window.location.search;
      const socket = new WebSocket(`${scheme}://${window.location.host}/ws/terminal/{{ service.id }}/${queryString}`);
      currentSocket = socket;

      socket.onopen = () => {
        retryCount = 0;
      };

      socket.onmessage = (event) => {
        if (typeof event.data === "string") {
          term.write(event.data);
          return;
        }
        if (event.data instanceof Blob) {
          event.data.arrayBuffer().then((buffer) => {
            const decoder = new TextDecoder("utf-8");
            term.write(decoder.decode(new Uint8Array(buffer)));
          }).catch(() => term.writeln("\r\n[ERROR DECODIFICANDO DATOS]\r\n"));
        }
      };

      socket.onerror = () => {
        term.writeln("\r\n[ERROR DE CONEXION WEBSOCKET]\r\n");
      };

      socket.onclose = (event) => {
        currentSocket = null;
        term.writeln(`\r\n[CONEXION CERRADA ${event.code}]`);

        if (event.code === 4403) {
          term.writeln("\r\nAcceso denegado. No se intentara reconectar.");
          return;
        }

        if (event.code === 1000 || event.code === 1001 || retryCount >= MAX_RETRIES) {
          if (retryCount >= MAX_RETRIES) {
            term.writeln("\r\nSe alcanzo el numero maximo de reintentos.");
          }
          return;
        }

        retryCount += 1;
        setTimeout(() => {
          term.writeln("\r\nReconectando...");
          connectSocket();
        }, 3000);
      };
    };

    term.onData((data) => {
      if (currentSocket && currentSocket.readyState === WebSocket.OPEN) {
        currentSocket.send(data);
      }
    });

    term.writeln("Conectando al contenedor...\r\n");
    connectSocket();
  });
</script>
{% endblock %}
