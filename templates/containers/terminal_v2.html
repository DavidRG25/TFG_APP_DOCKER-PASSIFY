{% extends "base.html" %}
{% load static %}

{% block extrahead %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
    .terminal-page {
        background-color: #1e1e1e;
        min-height: 100vh;
        padding: 20px;
    }
    
    .terminal-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        border-radius: 10px 10px 0 0;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    .terminal-header h3 {
        margin: 0;
        font-weight: 600;
    }
    
    .terminal-info {
        font-size: 0.9em;
        opacity: 0.9;
    }
    
    .terminal-actions {
        display: flex;
        gap: 10px;
    }
    
    .terminal-container {
        background-color: #000;
        border-radius: 0 0 10px 10px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        height: calc(100vh - 200px);
        min-height: 500px;
    }
    
    #terminal {
        height: 100%;
        width: 100%;
    }
    
    .status-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 2s infinite;
    }
    
    .status-connected {
        background-color: #4caf50;
    }
    
    .status-connecting {
        background-color: #ff9800;
    }
    
    .status-disconnected {
        background-color: #f44336;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    
    .btn-reconnect {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .btn-reconnect:hover {
        background-color: #45a049;
        transform: translateY(-2px);
    }
    
    .btn-reconnect:disabled {
        background-color: #ccc;
        cursor: not-allowed;
        transform: none;
    }
</style>
{% endblock %}

{% block body %}
<div class="terminal-page">
    <div class="terminal-header">
        <div>
            <h3>
                <span id="status-indicator" class="status-indicator status-connecting"></span>
                Terminal - {{ container_name }}
            </h3>
            <div class="terminal-info">
                <small id="status-text">Conectando...</small>
            </div>
        </div>
        <div class="terminal-actions">
            <button id="btn-reconnect" class="btn-reconnect" onclick="reconnect()" disabled>
                🔄 Reconectar
            </button>
            <a href="{{ return_url }}" class="btn btn-secondary">
                ← Volver
            </a>
        </div>
    </div>
    
    <div class="terminal-container">
        <div id="terminal"></div>
    </div>
</div>
{% endblock %}

{% block extrascripts %}
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    // Inicializar terminal con tema profesional
    const term = new Terminal({
        cursorBlink: true,
        cursorStyle: 'block',
        scrollback: 10000,
        tabStopWidth: 4,
        fontSize: 14,
        fontFamily: 'Menlo, Monaco, "Courier New", monospace',
        theme: {
            background: '#000000',
            foreground: '#ffffff',
            cursor: '#00ff00',
            cursorAccent: '#000000',
            selection: 'rgba(255, 255, 255, 0.3)',
            black: '#000000',
            red: '#e06c75',
            green: '#98c379',
            yellow: '#d19a66',
            blue: '#61afef',
            magenta: '#c678dd',
            cyan: '#56b6c2',
            white: '#abb2bf',
            brightBlack: '#5c6370',
            brightRed: '#e06c75',
            brightGreen: '#98c379',
            brightYellow: '#d19a66',
            brightBlue: '#61afef',
            brightMagenta: '#c678dd',
            brightCyan: '#56b6c2',
            brightWhite: '#ffffff'
        },
        allowProposedApi: true
    });
    
    // Addons
    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    
    // Auto-resize
    window.addEventListener('resize', () => {
        fitAddon.fit();
    });
    
    // WebSocket connection
    let currentSocket = null;
    let retryCount = 0;
    const MAX_RETRIES = 5;
    const RETRY_DELAY = 3000;
    
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const btnReconnect = document.getElementById('btn-reconnect');
    
    function updateStatus(status, text) {
        statusIndicator.className = `status-indicator status-${status}`;
        statusText.textContent = text;
        
        if (status === 'connected') {
            btnReconnect.disabled = true;
        } else if (status === 'disconnected') {
            btnReconnect.disabled = false;
        }
    }
    
    function connectSocket() {
        const scheme = window.location.protocol === "https:" ? "wss" : "ws";
        const queryString = window.location.search;
        const wsUrl = `${scheme}://${window.location.host}{{ ws_path }}${queryString}`;
        
        updateStatus('connecting', 'Conectando...');
        
        const socket = new WebSocket(wsUrl);
        currentSocket = socket;
        
        socket.onopen = () => {
            retryCount = 0;
            updateStatus('connected', 'Conectado');
            term.write('\r\n\x1b[1;32m✓ Conexión establecida\x1b[0m\r\n');
        };
        
        socket.onmessage = (event) => {
            if (typeof event.data === "string") {
                term.write(event.data);
            } else if (event.data instanceof Blob) {
                event.data.arrayBuffer().then((buffer) => {
                    const decoder = new TextDecoder("utf-8");
                    term.write(decoder.decode(new Uint8Array(buffer)));
                }).catch(() => {
                    term.write("\r\n\x1b[1;31m[ERROR] No se pudo decodificar los datos\x1b[0m\r\n");
                });
            }
        };
        
        socket.onerror = (error) => {
            console.error('WebSocket error:', error);
            term.write("\r\n\x1b[1;31m[ERROR] Error de conexión WebSocket\x1b[0m\r\n");
        };
        
        socket.onclose = (event) => {
            currentSocket = null;
            updateStatus('disconnected', 'Desconectado');
            
            term.write(`\r\n\x1b[1;33m[DESCONECTADO]\x1b[0m Código: ${event.code}\r\n`);
            
            // No reconectar si es error de autenticación/permisos
            if (event.code === 4401 || event.code === 4403) {
                term.write("\r\n\x1b[1;31m[ERROR]\x1b[0m Acceso denegado. Verifica tus permisos.\r\n");
                return;
            }
            
            // No reconectar si es cierre normal o se alcanzó el máximo de reintentos
            if (event.code === 1000 || event.code === 1001 || retryCount >= MAX_RETRIES) {
                if (retryCount >= MAX_RETRIES) {
                    term.write(`\r\n\x1b[1;31m[ERROR]\x1b[0m Máximo de reintentos alcanzado (${MAX_RETRIES})\r\n`);
                    term.write("\r\n\x1b[1;36mℹ\x1b[0m Usa el botón 'Reconectar' para intentar de nuevo.\r\n");
                }
                return;
            }
            
            // Auto-reconexión
            retryCount += 1;
            term.write(`\r\n\x1b[1;33m⟳\x1b[0m Reconectando en ${RETRY_DELAY/1000}s... (intento ${retryCount}/${MAX_RETRIES})\r\n`);
            
            setTimeout(() => {
                connectSocket();
            }, RETRY_DELAY);
        };
    }
    
    // Enviar input al contenedor
    term.onData((data) => {
        if (currentSocket && currentSocket.readyState === WebSocket.OPEN) {
            currentSocket.send(data);
        }
    });
    
    // Función de reconexión manual
    window.reconnect = function() {
        if (currentSocket && currentSocket.readyState === WebSocket.OPEN) {
            currentSocket.close();
        }
        retryCount = 0;
        term.write("\r\n\x1b[1;36m⟳ Reconectando manualmente...\x1b[0m\r\n");
        connectSocket();
    };
    
    // Iniciar conexión
    term.write("\x1b[1;36m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\x1b[0m\r\n");
    term.write("\x1b[1;35m  PaaSify Terminal v2.0\x1b[0m\r\n");
    term.write("\x1b[1;36m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\x1b[0m\r\n");
    term.write("\r\n");
    connectSocket();
});
</script>
{% endblock %}
