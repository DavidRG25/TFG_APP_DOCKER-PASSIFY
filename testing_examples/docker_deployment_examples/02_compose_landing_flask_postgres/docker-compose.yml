services:
  web:
    build: .
    container_name: paasify-compose-web
    ports:
      - "8081:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: paasify
      DB_USER: paasify
      DB_PASSWORD: paasify
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: paasify-compose-db
    environment:
      POSTGRES_DB: paasify
      POSTGRES_USER: paasify
      POSTGRES_PASSWORD: paasify
    volumes:
      - paasify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paasify -d paasify"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  paasify_pgdata:
